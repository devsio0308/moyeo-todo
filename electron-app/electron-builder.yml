# electron-builder 설정 (명세서 §7)
appId: com.hrjin.moyeo-todo
productName: MoyeoTodo
directories:
  output: dist

files:
  - out/**/*
  - package.json

# GitHub Releases를 업데이트 서버로 사용 (public 레포라 별도 인증 없이 설치본에서 확인 가능)
publish:
  provider: github
  owner: devsio0308
  repo: moyeo-todo

win:
  # 아키텍처 명시 필수 — Apple Silicon에서 크로스 빌드 시 지정하지 않으면
  # 호스트를 따라 arm64로 빌드되어 x64 Windows에서 빈 설치가 됨 (v0.1.0 사고)
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  shortcutName: 뭐해야하더라

mac:
  target:
    - dmg
  category: public.app-category.utilities

npmRebuild: false
